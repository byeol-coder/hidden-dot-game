name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add official DotPad Web SDK 3.0.0
        run: |
          mkdir -p dotpad-sdk
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/dotincorp/dotpad-sdk-guide/9544ebbbae27ce24db0eda425aac3936fd6af2f4/Web/3.0.0/DotPadSDK-3.0.0.js" \
            --output dotpad-sdk/DotPadSDK-3.0.0.js
          test -s dotpad-sdk/DotPadSDK-3.0.0.js
          node --check dotpad-sdk/DotPadSDK-3.0.0.js

      - name: Syntax check
        run: node --check src/main.js && node --check tts.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
